<!DOCTYPE html>
<html lang="tr">
<head>
    <!-- Sayfanın Türkçe karakterleri (ş, ı, ğ vb.) düzgün okumasını sağlar -->
    <meta charset="UTF-8">
    <!-- Sayfanın mobil cihazlarda (telefon/tablet) düzgün boyutlanması için zorunlu etiket -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap</title>
    <!-- Bootstrap kütüphanesini dışarıdan çekiyoruz (Tasarım kodları buradan geliyor) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
     <!--flex, align-items-center, justify-content-center: içindeki kartı sayfanın tam ortasına hizalar. 
     100vh: Yüksekliği ekranın %100'ü kadar yap. -->
<body class="bg-light d-flex align-items-center justify-content-center" style="height: 100vh;">

    <!-- Login Kutusu -->
    <div class="card shadow p-4 rounded-4" style="width: 400px;">
        
        <!-- Başlık ve açıklama kısmı (text-center ile ortalanmış) -->
        <div class="text-center mb-4">
            <h3 class="fw-bold text-primary">Öğrenci Girişi</h3>
            <p class="text-muted small">Lütfen okul mailiniz ve öğrenci numaranız ile giriş yapın.</p>
        </div>
        
        <!-- Form Başlangıcı
             action="login.php": Form onaylandığında verilerin gideceği PHP dosyası.
             method="POST": Verileri adres çubuğunda göstermeden, gizli ve güvenli gönderir.
             onsubmit="return formKontrol()": Butona basılınca formKontrol adlı JS fonksiyonunu çalıştırır.
             novalidate: Tarayıcının kendi sıkıcı hata mesajlarını kapatır (çünkü hataları biz JS ile göstereceğiz). -->
        <form action="login.php" method="POST" onsubmit="return formKontrol()" novalidate>
            
            <!-- E-posta giriş alanı -->
            <div class="mb-3">
                <label class="form-label fw-bold">Kullanıcı Adı (E-posta)</label>
                <!-- id="email": JavaScript'in bu kutuyu bulması için. 
                     name="email": PHP'nin veriyi çekebilmesi için. -->
                <input type="email" id="email" name="email" class="form-control" placeholder="b123456789@sakarya.edu.tr">
            </div>
            
            <!-- Şifre giriş alanı -->
            <div class="mb-4">
                <label class="form-label fw-bold">Şifre (Öğrenci No)</label>
                <input type="password" id="sifre" name="sifre" class="form-control" placeholder="b123456789">
            </div>

            <!-- Hata Mesajı Kutusu 
                 Başlangıçta style="display: none;" verilerek görünmez yapıldı. Hata olursa JS ile açılacak. -->
            <div id="hataMesaji" class="alert alert-danger p-2 small" style="display: none;"></div>
            
            <!-- Gönderme Butonu (type="submit" olmak zorundadır, yoksa form çalışmaz) -->
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Giriş Yap</button>
        </form>
    </div>

<script>
// Butona basıldığında çalışacak olan kontrol fonksiyonu
function formKontrol() {
    
    // İnputları değişkene atama.
    // .trim() fonksiyonu: Kullanıcı yanlışlıkla sağa sola boşluk koyduysa onları temizler.
    const email = document.getElementById('email').value.trim();
    const sifre = document.getElementById('sifre').value.trim();
    
    // Hata mesajı
    const hataKutusu = document.getElementById('hataMesaji');

    // 1. KONTROL: Kutular boş mu diye kontrol
    // || işareti VEYA anlamına gelir. Biri veya diğeri boşsa...
    if (email === "" || sifre === "") {
        hataKutusu.innerHTML = "Alanlar boş bırakılamaz!"; // Div'in içine bu yazıyı bas
        hataKutusu.style.display = "block"; // Gizli olan div'i görünür yap
        return false; // return false: Formun login.php'ye gitmesini engeller, işlemi durdurur.
    }

    // 2. KONTROL: Mail adresi @sakarya.edu.tr ile bitiyor mu?
    // Başındaki ünlem (!) DEĞİLSE anlamına gelir. Yani endsWith("@sakarya...") DEĞİLSE içeri gir.
    if (!email.endsWith("@sakarya.edu.tr")) {
        hataKutusu.innerHTML = "Lütfen geçerli bir @sakarya.edu.tr uzantılı mail giriniz!";
        hataKutusu.style.display = "block"; // Hata kutusunu görünür yap
        return false; // İşlemi iptal et, form gönderilmesin
    }

    // Eğer kod buraya kadar geldiyse yukarıdaki if'lere takılmamış, yani hata yapmamıştır.
    // Her ihtimale karşı hata kutusunu tekrar gizliyoruz.
    hataKutusu.style.display = "none";
    
    // return true: Her şey yolunda, verileri action kısmındaki login.php'ye gönderebilirsin onayıdır.
    return true; 
}
</script>

</body>
</html>
